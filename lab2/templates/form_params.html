{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">Параметры формы</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Отправить данные формы</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" name="name" class="form-control" placeholder="Введите имя">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Введите email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сообщение</label>
                        <textarea name="message" class="form-control" rows="3" placeholder="Введите сообщение"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Отправленные данные</h5>
            </div>
            <div class="card-body">
                {% if submitted and form_data %}
                    <table class="table table-striped">
                        <thead>
                            <tr><th>Поле</th><th>Значение</th></tr>
                        </thead>
                        <tbody>
                            {% for key, value in form_data.items() %}
                            <tr>
                                <td><strong>{{ key }}</strong></td>
                                <td>{{ value }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                {% else %}
                    <p class="text-muted">Данные ещё не отправлены</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
