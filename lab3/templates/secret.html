{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-success">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">🔒 Секретная страница</h4>
            </div>
            <div class="card-body">
                <p class="lead">Поздравляю! Вы успешно аутентифицировались.</p>
                <p>Это секретная страница, доступная только авторизованным пользователям.</p>
                <p>Ваш логин: <strong>{{ current_user.id }}</strong></p>

                <p class="text-muted">Здесь может быть любой секретный контент.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
