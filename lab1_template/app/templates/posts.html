{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Последние посты</h1>
<div class="list-group">
    {% for post in posts %}
    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="list-group-item list-group-item-action">
        <h5 class="mb-1">{{ post.title }}</h5>
        <small>{{ post.date.strftime('%d.%m.%Y') }} — {{ post.author }}</small>
    </a>
    {% endfor %}
</div>
{% endblock %}
